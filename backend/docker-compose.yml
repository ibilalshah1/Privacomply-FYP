services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: privacmply_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # Uncomment to enable API key auth on Qdrant itself:
      # - QDRANT__SERVICE__API_KEY=your_qdrant_api_key

volumes:
  qdrant_storage:
    driver: local